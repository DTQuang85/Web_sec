<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chi Tiết Đơn Hàng</title>
    <link rel="icon" th:href="@{/images/favicon.ico}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body class="site-page">
<header th:replace="fragments/header :: siteHeader"></header>

<main class="container page-shell py-4">
    <section class="page-hero-mini">
        <span class="page-kicker">Đơn Hàng</span>
        <h1 class="page-title">Chi Tiết Đơn #<span th:text="${order.id}">1</span></h1>
        <p class="page-subtitle">Thông tin sản phẩm, trạng thái và tổng thanh toán được cập nhật theo thời gian thực.</p>
    </section>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <a class="btn btn-outline-secondary btn-sm" th:href="@{/my-orders}">Quay Lại</a>
    </div>

    <p><strong>Ngày tạo:</strong> <span th:text="${order.createdAt}">date</span></p>
    <p><strong>Trạng thái:</strong> <span class="badge bg-info" th:text="${order.status}">NEW</span></p>

    <table class="table table-bordered panel-card">
        <thead>
        <tr><th>Sản phẩm</th><th>Đơn giá</th><th>Số lượng</th><th>Tạm tính</th></tr>
        </thead>
        <tbody>
        <tr th:each="item : ${items}">
            <td th:text="${productMap[item.productId].name}">Product</td>
            <td th:text="${#numbers.formatDecimal(productMap[item.productId].price,1,2)} + ' USD'">0</td>
            <td th:text="${item.quantity}">1</td>
            <td th:text="${#numbers.formatDecimal(productMap[item.productId].price * item.quantity,1,2)} + ' USD'">0</td>
        </tr>
        </tbody>
    </table>

    <h5 class="text-end">Tổng: <span class="text-danger" th:text="${#numbers.formatDecimal(order.total,1,2)} + ' USD'">0</span></h5>
</main>

<footer th:replace="fragments/footer :: siteFooter"></footer>
</body>
</html>
