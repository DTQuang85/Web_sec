<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đăng Nhập Tài Khoản</title>
    <link rel="icon" th:href="@{/images/favicon.ico}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body class="site-page">
<header th:replace="fragments/header :: siteHeader"></header>

<main class="container page-shell py-4" style="max-width: 560px;">
    <section class="page-hero-mini">
        <span class="page-kicker">TechStore Account</span>
        <h1 class="page-title">Đăng Nhập Tài Khoản</h1>
        <p class="page-subtitle">Truy cập nhanh để quản lý đơn hàng, giỏ hàng và ưu đãi dành riêng cho bạn.</p>
    </section>

<div class="container px-0" style="max-width: 520px;">
    <div class="card panel-card">
        <div class="card-body p-4">
            <h3 class="mb-3">Đăng Nhập Tài Khoản</h3>
            <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
            <form method="post" th:action="@{/login}">
                <input type="hidden" name="next" th:if="${next != null}" th:value="${next}" />
                <div class="mb-3">
                    <label class="form-label">Tên đăng nhập hoặc Email</label>
                    <input name="loginId" class="form-control" th:value="${loginId}" required />
                </div>
                <div class="mb-3">
                    <label class="form-label">Mật khẩu</label>
                    <input name="password" type="password" class="form-control" required />
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="rememberMe" />
                    <label class="form-check-label" for="rememberMe">Ghi nhớ đăng nhập</label>
                </div>
                <button type="submit" class="btn btn-primary w-100" data-loading="true">Đăng Nhập</button>
            </form>
            <div class="text-end mt-2"><a href="#" class="small">Quên mật khẩu?</a></div>
            <p class="mt-3 mb-0 text-center">Chưa có tài khoản? <a th:href="@{/register}">Đăng Ký Ngay</a></p>
        </div>
    </div>
</div>
</main>

<footer th:replace="fragments/footer :: siteFooter"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
