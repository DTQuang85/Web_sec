<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Liên Hệ - TechStore</title>
    <link rel="icon" th:href="@{/images/favicon.ico}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body class="contact-page site-page">
<header th:replace="fragments/header :: siteHeader"></header>

<main class="container page-shell py-4">
    <section class="page-hero-mini">
        <span class="page-kicker">Liên Hệ</span>
        <h1 class="page-title">Kết Nối Nhanh Cùng TechStore</h1>
        <p class="page-subtitle">Đội ngũ hỗ trợ luôn sẵn sàng tư vấn sản phẩm, bảo hành và xử lý đơn hàng cho bạn.</p>
    </section>

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb app-breadcrumb">
            <li class="breadcrumb-item"><a href="/" th:href="@{/}">Trang Chủ</a></li>
            <li class="breadcrumb-item active" aria-current="page">Liên Hệ</li>
        </ol>
    </nav>

    <section class="panel-card p-4 mb-4">
        <h2 class="mb-3">Thông Tin Liên Hệ</h2>
        <div class="row g-4">
            <div class="col-lg-5">
                <div class="small mb-2"><i class="bi bi-envelope me-2 text-primary"></i>support@techstore.vn</div>
                <div class="small mb-2"><i class="bi bi-telephone me-2 text-primary"></i>1900 1234 (8:00 - 22:00)</div>
                <div class="small mb-2">
                    <i class="bi bi-geo-alt me-2 text-primary"></i>
                    <a class="text-decoration-none" href="https://maps.google.com/?q=Đại%20Học%20Công%20Nghệ%20Kỹ%20Thuật%20TP.HCM" target="_blank" rel="noopener noreferrer">
                        Đại Học Công Nghệ Kỹ Thuật TP.HCM
                    </a>
                </div>
                <div class="small mb-3"><i class="bi bi-clock me-2 text-primary"></i>Thứ 2 - Chủ Nhật: 8:00 - 22:00</div>
            </div>
            <div class="col-lg-7">
                <iframe class="map-embed" loading="lazy" allowfullscreen src="https://maps.google.com/maps?q=%C4%90%E1%BA%A1i%20H%E1%BB%8Dc%20C%C3%B4ng%20Ngh%E1%BB%87%20K%E1%BB%B9%20Thu%E1%BA%ADt%20TP.HCM&t=&z=15&ie=UTF8&iwloc=&output=embed"></iframe>
            </div>
        </div>
    </section>
</main>

<footer th:replace="fragments/footer :: siteFooter"></footer>
</body>
</html>
