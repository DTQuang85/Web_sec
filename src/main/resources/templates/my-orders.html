<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đơn Hàng Của Tôi</title>
    <link rel="icon" th:href="@{/images/favicon.ico}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body class="site-page">
<header th:replace="fragments/header :: siteHeader"></header>

<main class="container page-shell py-4">
    <section class="page-hero-mini">
        <span class="page-kicker">TechStore Orders</span>
        <h1 class="page-title">Đơn Hàng Của Tôi</h1>
        <p class="page-subtitle">Theo dõi trạng thái xử lý và lịch sử mua sắm của bạn trong một nơi duy nhất.</p>
    </section>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <a class="btn btn-outline-secondary btn-sm" th:href="@{/}">Về Trang Chủ</a>
    </div>

    <table class="table table-bordered panel-card">
        <thead>
        <tr><th>Mã đơn</th><th>Ngày tạo</th><th>Tổng tiền</th><th>Trạng thái</th><th></th></tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}">1</td>
            <td th:text="${order.createdAt != null ? #temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm') : 'N/A'}">date</td>
            <td th:text="${order.total != null ? #numbers.formatDecimal(order.total,1,2) + ' USD' : '0.00 USD'}">0</td>
            <td><span class="badge bg-info" th:text="${order.status != null ? order.status : 'NEW'}">NEW</span></td>
            <td><a class="btn btn-sm btn-primary" th:href="@{/my-orders/{id}(id=${order.id})}">Chi Tiết</a></td>
        </tr>
        <tr th:if="${#lists.isEmpty(orders)}"><td colspan="5" class="text-center">Chưa có đơn hàng</td></tr>
        </tbody>
    </table>
</main>

<footer th:replace="fragments/footer :: siteFooter"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
