<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Giỏ Hàng</title>
    <link rel="icon" th:href="@{/images/favicon.ico}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body class="site-page">
<header th:replace="fragments/header :: siteHeader"></header>

<main class="container page-shell py-4">
    <section class="page-hero-mini">
        <span class="page-kicker">Giỏ Hàng</span>
        <h1 class="page-title">Chi Tiết Giỏ Hàng</h1>
        <p class="page-subtitle">Kiểm tra lại sản phẩm, số lượng và tổng thanh toán trước khi đặt đơn.</p>
    </section>

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb app-breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">Trang Chủ</a></li>
            <li class="breadcrumb-item active" aria-current="page">Giỏ Hàng</li>
        </ol>
    </nav>

    <div class="table-responsive">
        <table class="table table-bordered align-middle panel-card">
            <thead>
            <tr><th>Sản phẩm</th><th>Đơn giá</th><th>Số lượng</th><th>Thành tiền</th><th></th></tr>
            </thead>
            <tbody>
            <tr th:each="item : ${cartItems}">
                <td>
                    <div class="cart-product-cell">
                        <img
                            class="cart-product-thumb"
                            th:src="${item.product.image != null and item.product.image.startsWith('http') ? item.product.image : '/uploads/' + item.product.image}"
                            onerror="this.src='https://via.placeholder.com/64?text=No+Image'"
                            alt="product"
                        />
                        <div>
                            <div class="fw-semibold" th:text="${item.product.name}">name</div>
                        </div>
                    </div>
                </td>
                <td th:text="${#numbers.formatDecimal(item.product.price,1,2)} + ' USD'">0</td>
                <td>
                    <form method="post" th:action="@{/cart/update}" class="d-flex gap-2">
                        <input type="hidden" name="productId" th:value="${item.product.id}" />
                        <input type="number" min="1" name="quantity" class="form-control" th:value="${item.quantity}" style="width: 90px;" />
                        <button class="btn btn-sm btn-outline-primary" type="submit">Cập Nhật Giỏ Hàng</button>
                    </form>
                </td>
                <td th:text="${#numbers.formatDecimal(item.subtotal,1,2)} + ' USD'">0</td>
                <td>
                    <form method="post" th:action="@{'/cart/remove/' + ${item.product.id}}">
                        <button class="btn btn-sm btn-outline-danger" type="submit">Xóa</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(cartItems)}"><td colspan="5" class="text-center">Giỏ hàng trống</td></tr>
            </tbody>
        </table>
    </div>

    <div class="panel-card p-3">
        <div class="row g-3 align-items-end">
            <div class="col-lg-4">
                <label class="form-label">Mã giảm giá</label>
                <input class="form-control" placeholder="Nhập mã giảm giá" />
            </div>
            <div class="col-lg-8 text-lg-end">
                <div class="cart-summary">
                    <div class="cart-summary-row"><span>Tạm tính:</span><strong th:text="${#numbers.formatDecimal(total,1,2)} + ' USD'">0</strong></div>
                    <div class="cart-summary-row"><span>Phí vận chuyển:</span><strong>Miễn phí / Tính sau</strong></div>
                    <div class="cart-summary-row"><span>Giảm giá:</span><strong>0 VNĐ</strong></div>
                    <div class="cart-summary-total"><span>Tổng cộng:</span><strong th:text="${#numbers.formatDecimal(total,1,2)} + ' USD'">0</strong></div>
                </div>
                <form method="post" th:action="@{/cart/checkout}">
                    <button class="btn btn-success" type="submit" th:disabled="${#lists.isEmpty(cartItems)}">Thanh Toán</button>
                </form>
            </div>
        </div>
    </div>
</main>

<footer th:replace="fragments/footer :: siteFooter"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
