<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quản Lý Người Dùng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body class="site-page">
<div class="admin-wrapper">
    <aside th:replace="fragments/admin-nav :: adminSidebar('users')"></aside>

    <main class="admin-content">
        <section class="page-hero-mini">
            <span class="page-kicker">Admin Users</span>
            <h1 class="page-title">Quản Lý Người Dùng</h1>
            <p class="page-subtitle">Khu vực toàn quyền cho SUPER_ADMIN: quản trị tài khoản, phân quyền và kiểm soát truy cập hệ thống.</p>
        </section>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#userModal">Thêm Người Dùng</button>
        </div>

        <form method="get" class="row g-2 mb-3">
            <div class="col-md-10"><input name="keyword" class="form-control" placeholder="Tìm kiếm người dùng" th:value="${keyword}" /></div>
            <div class="col-md-2 d-grid"><button class="btn btn-outline-primary" type="submit">Tìm</button></div>
        </form>

        <table class="table table-striped table-bordered panel-card">
            <thead><tr><th>ID</th><th>Tên đăng nhập</th><th>Vai trò</th><th width="260">Thao tác</th></tr></thead>
            <tbody>
            <tr th:each="u : ${users.content}">
                <td th:text="${u.id}">1</td>
                <td th:text="${u.username}">username</td>
                <td th:text="${u.role}">USER</td>
                <td>
                    <form method="post" th:action="@{/admin/users/save}" class="d-flex gap-2 mb-1">
                        <input type="hidden" name="id" th:value="${u.id}" />
                        <input class="form-control form-control-sm" name="username" th:value="${u.username}" />
                        <input class="form-control form-control-sm" type="password" name="password" placeholder="Để trống nếu không đổi" />
                        <select class="form-select form-select-sm" name="role">
                            <option value="USER" th:selected="${u.role == 'USER'}">USER</option>
                            <option value="ADMIN" th:selected="${u.role == 'ADMIN'}">ADMIN</option>
                            <option value="SUPER_ADMIN" th:if="${currentUser != null and #strings.equalsIgnoreCase(currentUser.role, 'SUPER_ADMIN')}" th:selected="${u.role == 'SUPER_ADMIN'}">SUPER_ADMIN</option>
                        </select>
                        <button class="btn btn-sm btn-success" type="submit">Lưu</button>
                    </form>
                    <form method="post" th:action="@{'/admin/users/delete/' + ${u.id}}">
                        <button class="btn btn-sm btn-outline-danger" type="submit"
                                th:disabled="${(currentUser != null and currentUser.id == u.id) or (u.role == 'SUPER_ADMIN' and (currentUser == null or !#strings.equalsIgnoreCase(currentUser.role, 'SUPER_ADMIN')))}">Xóa</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

        <nav>
            <ul class="pagination pagination-modern">
                <li class="page-item" th:classappend="${users.first}? 'disabled'">
                    <a class="page-link" th:href="@{/admin/users(page=${users.number-1},keyword=${keyword})}"><i class="bi bi-chevron-left"></i></a>
                </li>
                <li class="page-item active"><span class="page-link" th:text="${users.number + 1}">1</span></li>
                <li class="page-item" th:classappend="${users.last}? 'disabled'">
                    <a class="page-link" th:href="@{/admin/users(page=${users.number+1},keyword=${keyword})}"><i class="bi bi-chevron-right"></i></a>
                </li>
            </ul>
        </nav>
    </main>
</div>

<footer th:replace="fragments/footer :: siteFooter"></footer>

<div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form method="post" th:action="@{/admin/users/save}">
                <div class="modal-header"><h5 class="modal-title">Thêm người dùng mới</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <div class="mb-2"><label>Tên đăng nhập</label><input class="form-control" name="username" required /></div>
                    <div class="mb-2"><label>Mật khẩu</label><input class="form-control" name="password" required /></div>
                    <div class="mb-2"><label>Vai trò</label><select class="form-select" name="role"><option value="USER">USER</option><option value="ADMIN">ADMIN</option><option th:if="${currentUser != null and #strings.equalsIgnoreCase(currentUser.role, 'SUPER_ADMIN')}" value="SUPER_ADMIN">SUPER_ADMIN</option></select></div>
                </div>
                <div class="modal-footer"><button class="btn btn-primary" type="submit">Lưu</button></div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
