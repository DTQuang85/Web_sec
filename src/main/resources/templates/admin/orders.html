<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quản Lý Đơn Hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body class="site-page">
<div class="admin-wrapper">
    <aside th:replace="fragments/admin-nav :: adminSidebar('orders')"></aside>

    <main class="admin-content">
        <section class="page-hero-mini">
            <span class="page-kicker">Admin Orders</span>
            <h1 class="page-title">Quản Lý Đơn Hàng</h1>
            <p class="page-subtitle">Theo dõi trạng thái và điều hướng xử lý từng đơn hàng tập trung.</p>
        </section>

        <div class="row g-3 mb-3">
            <div class="col-md-6 col-xl-4"><div class="panel-card p-3 h-100"><small class="text-muted d-block">Tổng đơn</small><h4 class="mb-0" th:text="${#lists.size(orders)}">0</h4></div></div>
            <div class="col-md-6 col-xl-4"><div class="panel-card p-3 h-100"><small class="text-muted d-block">Đang xử lý</small><h4 class="mb-0" th:text="${#lists.size(orders.?[status == 'NEW' or status == 'PROCESSING'])}">0</h4></div></div>
            <div class="col-md-6 col-xl-4"><div class="panel-card p-3 h-100"><small class="text-muted d-block">Đã hoàn tất</small><h4 class="mb-0" th:text="${#lists.size(orders.?[status == 'DONE'])}">0</h4></div></div>
        </div>

        <div class="panel-card p-3 admin-table-shell">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0 admin-orders-table">
                    <thead><tr><th>Mã Đơn</th><th>Khách Hàng</th><th>Tổng tiền</th><th>Ngày tạo</th><th>Trạng thái</th><th class="text-end">Hành động</th></tr></thead>
                    <tbody>
                    <tr th:each="o : ${orders}">
                        <td><span class="fw-semibold" th:text="'#' + ${o.id}">#1</span></td>
                        <td>
                            <span class="badge rounded-pill text-bg-light border" th:text="'User #' + ${o.userId}">User #1</span>
                        </td>
                        <td><span class="fw-semibold" th:text="${#numbers.formatDecimal(o.total,1,2)} + ' USD'">0</span></td>
                        <td class="text-muted" th:text="${o.createdAt}">time</td>
                        <td>
                            <span class="badge rounded-pill"
                                  th:classappend="${o.status == 'DONE'} ? ' text-bg-success' : (${o.status == 'CANCELED'} ? ' text-bg-danger' : (${o.status == 'SHIPPED'} ? ' text-bg-primary' : ' text-bg-warning'))"
                                  th:text="${o.status}">NEW</span>
                        </td>
                        <td class="text-end"><a class="btn btn-sm btn-primary" th:href="@{'/admin/orders/' + ${o.id}}">Chi Tiết</a></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
<footer th:replace="fragments/footer :: siteFooter"></footer>
</body>
</html>
