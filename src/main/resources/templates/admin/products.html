<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quản Lý Sản Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body class="site-page">
<div class="admin-wrapper">
    <aside th:replace="fragments/admin-nav :: adminSidebar('products')"></aside>

    <main class="admin-content">
        <section class="page-hero-mini">
            <span class="page-kicker">Admin Products</span>
            <h1 class="page-title">Quản Lý Sản Phẩm</h1>
            <p class="page-subtitle">Cập nhật danh mục, giá bán và nội dung hiển thị sản phẩm theo chuẩn giao diện mới.</p>
        </section>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#productModal">Thêm Sản Phẩm Mới</button>
            <span class="badge bg-dark" th:text="'Tổng sản phẩm: ' + ${#lists.size(products)}">Tổng sản phẩm: 0</span>
        </div>

        <div class="mb-3">
            <input type="text" id="searchInput" class="form-control" placeholder="Tìm kiếm sản phẩm (theo tên, ID hoặc giá)..." />
        </div>

        <div class="panel-card p-3 admin-table-shell">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0 admin-product-table">
                    <thead>
                    <tr><th>ID</th><th>Ảnh</th><th>Tên</th><th>Giá</th><th>Mô tả</th><th>Chỉnh sửa nhanh</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="p : ${products}">
                        <td class="text-muted fw-semibold" th:text="${p.id}">1</td>
                        <td><img class="admin-thumb" th:src="${p.image != null and p.image.startsWith('http') ? p.image : (p.image != null ? '/uploads/' + p.image : 'https://via.placeholder.com/60')}" alt="img" /></td>
                        <td>
                            <div class="fw-semibold" th:text="${p.name}">name</div>
                            <small class="text-muted">SKU #<span th:text="${p.id}">1</span></small>
                        </td>
                        <td>
                            <span class="badge bg-success-subtle text-success-emphasis" th:text="${#numbers.formatDecimal(p.price,1,2)} + ' USD'">0</span>
                        </td>
                        <td class="text-muted" th:text="${#strings.abbreviate(p.description, 90)}">desc</td>
                        <td>
                            <form method="post" th:action="@{/admin/products/save}" class="product-edit-form mb-2">
                                <input type="hidden" name="id" th:value="${p.id}" />
                                <input class="form-control form-control-sm" name="name" th:value="${p.name}" placeholder="Tên" />
                                <input class="form-control form-control-sm" name="price" th:value="${p.price}" placeholder="Giá" />
                                <input class="form-control form-control-sm" name="imageUrl" th:value="${p.image}" placeholder="Link ảnh (https://...)" />
                                <textarea class="form-control form-control-sm" name="description" rows="2" th:text="${p.description}" placeholder="Mô tả"></textarea>
                                <button class="btn btn-sm btn-primary" type="submit">Lưu</button>
                            </form>
                            <form method="post" th:action="@{'/admin/products/delete/' + ${p.id}}">
                                <button class="btn btn-sm btn-outline-danger" type="submit">Xóa</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="panel-card p-3 mt-3">
            <h6 class="mb-2">Import sản phẩm từ Excel</h6>
            <form class="row g-2" method="post" action="#" enctype="multipart/form-data">
                <div class="col-md-8"><input class="form-control" type="file" /></div>
                <div class="col-md-4 d-grid"><button class="btn btn-outline-primary" type="button">Import</button></div>
            </form>
        </div>
    </main>
</div>

<footer th:replace="fragments/footer :: siteFooter"></footer>

<div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <form method="post" th:action="@{/admin/products/save}">
                <div class="modal-header"><h5 class="modal-title">Thêm sản phẩm</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body row g-2">
                    <div class="col-md-6"><label>Tên</label><input class="form-control" name="name" required /></div>
                    <div class="col-md-6"><label>Giá</label><input class="form-control" name="price" type="number" step="0.01" required /></div>
                    <div class="col-12"><label>Mô tả</label><textarea class="form-control" name="description" rows="3" required></textarea></div>
                    <div class="col-12"><label>Link ảnh sản phẩm</label><input class="form-control" name="imageUrl" placeholder="https://..." required /></div>
                </div>
                <div class="modal-footer"><button class="btn btn-primary" type="submit">Lưu</button></div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('searchInput').addEventListener('keyup', function(e) {
    const searchText = e.target.value.toLowerCase();
    const tableRows = document.querySelectorAll('.admin-product-table tbody tr');
    let visibleCount = 0;

    tableRows.forEach(row => {
        const id = row.querySelector('td:nth-child(1)').textContent.trim();
        const name = row.querySelector('td:nth-child(3)').textContent.toLowerCase();
        const price = row.querySelector('td:nth-child(4)').textContent.toLowerCase();
        
        if (id.includes(searchText) || name.includes(searchText) || price.includes(searchText)) {
            row.style.display = '';
            visibleCount++;
        } else {
            row.style.display = 'none';
        }
    });

    // Show message if no results
    const tbody = document.querySelector('.admin-product-table tbody');
    let noResultsMsg = document.querySelector('.no-results-message');
    
    if (visibleCount === 0 && searchText !== '') {
        if (!noResultsMsg) {
            noResultsMsg = document.createElement('tr');
            noResultsMsg.className = 'no-results-message';
            noResultsMsg.innerHTML = '<td colspan="6" class="text-center text-muted py-3">Không tìm thấy sản phẩm nào</td>';
            tbody.appendChild(noResultsMsg);
        }
    } else if (noResultsMsg) {
        noResultsMsg.remove();
    }
});
</script>
</body>
</html>
