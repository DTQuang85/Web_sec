<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chi Tiết Đơn Hàng Quản Trị</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body class="site-page">
<div class="admin-wrapper">
    <aside th:replace="fragments/admin-nav :: adminSidebar('orders')"></aside>

    <main class="admin-content">
        <section class="page-hero-mini">
            <span class="page-kicker">Order Detail</span>
            <h1 class="page-title">Chi Tiết Đơn #<span th:text="${order.id}">1</span></h1>
            <p class="page-subtitle">Quản trị trạng thái xử lý và rà soát chi tiết từng sản phẩm trong đơn.</p>
        </section>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/orders}">Quay Lại</a>
        </div>

        <div class="row g-3 mb-3">
            <div class="col-md-4"><div class="panel-card p-3"><small class="text-muted d-block">Khách hàng</small><strong th:text="'User #' + ${order.userId}">User #1</strong></div></div>
            <div class="col-md-4"><div class="panel-card p-3"><small class="text-muted d-block">Ngày tạo</small><strong th:text="${order.createdAt}">time</strong></div></div>
            <div class="col-md-4"><div class="panel-card p-3"><small class="text-muted d-block">Tổng tiền</small><strong class="text-success" th:text="${#numbers.formatDecimal(order.total,1,2)} + ' USD'">0</strong></div></div>
        </div>

        <div class="panel-card p-3 mb-4">
            <form method="post" th:action="@{'/admin/orders/' + ${order.id} + '/status'}" class="row g-2 align-items-end">
                <div class="col-md-4 col-lg-3">
                    <label class="form-label">Trạng thái</label>
                    <select class="form-select" name="status">
                        <option value="NEW" th:selected="${order.status == 'NEW'}">NEW</option>
                        <option value="PROCESSING" th:selected="${order.status == 'PROCESSING'}">PROCESSING</option>
                        <option value="SHIPPED" th:selected="${order.status == 'SHIPPED'}">SHIPPED</option>
                        <option value="DONE" th:selected="${order.status == 'DONE'}">DONE</option>
                        <option value="CANCELED" th:selected="${order.status == 'CANCELED'}">CANCELED</option>
                    </select>
                </div>
                <div class="col-md-3 col-lg-2"><button class="btn btn-primary w-100" type="submit">Cập Nhật</button></div>
            </form>
        </div>

        <div class="panel-card p-3 admin-table-shell">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead><tr><th>Sản phẩm</th><th>Giá</th><th>SL</th><th>Tạm tính</th></tr></thead>
                    <tbody>
                    <tr th:each="item : ${items}">
                        <td class="fw-semibold" th:text="${productMap[item.productId].name}">Product</td>
                        <td th:text="${#numbers.formatDecimal(productMap[item.productId].price,1,2)} + ' USD'">0</td>
                        <td><span class="badge text-bg-light border" th:text="${item.quantity}">1</span></td>
                        <td class="fw-semibold text-success" th:text="${#numbers.formatDecimal(productMap[item.productId].price * item.quantity,1,2)} + ' USD'">0</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
<footer th:replace="fragments/footer :: siteFooter"></footer>
</body>
</html>
